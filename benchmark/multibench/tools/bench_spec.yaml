# Microbench spec — read by gen_kernels.py.
#
# Each entry under `benches` produces one src/generated/kernel_<name>.S file.
#
# Schema:
#   name:              kernel symbol; emitted as "kernel_<name>"
#   archetype:         rept | mixed | art_loop | random_load | wfi
#                      rept     - one instruction repeated N times via .rept
#                      mixed    - explicit per-line instruction stream wrapped in .rept
#                      art_loop - backward-branch loop body of given size, iterated
#                                 enough times to reach total_fetches
#                      random_load - PRNG-driven LDR offsets across a buffer
#                      wfi      - hand-archetype, generator emits a stub note only;
#                                 the .S itself is hand-written
#   count:             (rept) repetition count
#   instruction:       (rept) the assembly mnemonic, e.g. "vmul.f32 s0, s0, s1"
#   prologue:          (rept) optional list of asm lines before .rept block
#   pattern_prologue:  (mixed) lines before the .rept block
#   pattern:           (mixed) lines inside the .rept block
#   body_bytes:        (art_loop) requested loop-body footprint
#   total_fetches:     (art_loop) target total instruction fetches
#   buffer_bytes:      (random_load) total buffer footprint
#   seed:              (random_load) PRNG seed
#   wake_us:           (wfi) wake time
#   data:              dict (single buffer) or list (multiple buffers)
#                      keys: symbol, kind=word, count, init=0, section='.data'
#   aapcs:             minimal | full_int | full_fpu | full_int_fpu
#   align:             instruction alignment in bytes (default 16 = .balign 16)
#   needs_warmup:      exposed as BenchEntry.needs_warmup
#   needs_nvic_reset:  exposed as BenchEntry.needs_nvic_reset
#   partition:         core | memory
#   smoke:             true if part of the smoke set
#   gem5_safe:         hint only; true unless the bench triggers the multi-d-reg
#                      vldmia/vstmia decoder bug
#
# count chosen for ~50-100 us ROI at 170 MHz (~8K-16K instructions).

defaults:
  align: 16
  aapcs: minimal
  needs_warmup: false
  needs_nvic_reset: false
  smoke: false
  gem5_safe: true

benches:
  # ====================================================================
  # 1. Baseline + integer  (core partition)
  # ====================================================================
  - name: nop_8k
    archetype: rept
    instruction: "nop"
    count: 8192
    partition: core
    smoke: true

  - name: alu_indep_const_8k
    # Distinct destination register on each line so dispatch is
    # throughput-bound, not latency-bound. Round-robin r4-r7.
    archetype: mixed
    count: 2048  # *4 instr/iter = 8192 total
    pattern_prologue:
      - "movs r4, #1"
      - "movs r5, #2"
      - "movs r6, #3"
      - "movs r7, #4"
    pattern:
      - "adds r4, r4, #1"
      - "adds r5, r5, #1"
      - "adds r6, r6, #1"
      - "adds r7, r7, #1"
    aapcs: full_int
    partition: core
    smoke: true

  - name: alu_dep_const_8k
    archetype: rept
    instruction: "adds r4, r4, #1"
    count: 8192
    aapcs: full_int
    prologue:
      - "movs r4, #0"
    partition: core

  - name: mul_const_8k
    archetype: rept
    instruction: "mul r4, r4, r5"
    count: 8192
    aapcs: full_int
    prologue:
      - "movs r4, #1"
      - "movs r5, #1"
    partition: core
    smoke: true

  - name: mull_const_8k
    # UMULL Rd_lo, Rd_hi, Rn, Rm — 32x32->64 bit, 4-7 cycles on M4
    archetype: rept
    instruction: "umull r4, r5, r6, r7"
    count: 4096
    aapcs: full_int
    prologue:
      - "movs r6, #1"
      - "movs r7, #1"
    partition: core

  - name: div_const_8k
    # UDIV constant divisor (best case ~3 cycles)
    archetype: rept
    instruction: "udiv r4, r5, r6"
    count: 4096
    aapcs: full_int
    prologue:
      - "movs r5, #100"
      - "movs r6, #5"
    partition: core

  # ====================================================================
  # 2. FPU per-op  (core partition; gem5 stretch-goal per Zhantong)
  # ====================================================================
  - name: vadd_const_8k
    archetype: rept
    instruction: "vadd.f32 s0, s1, s2"
    count: 8192
    prologue:
      - "vmov.f32 s1, #1.0"
      - "vmov.f32 s2, #2.0"
    partition: core

  - name: vmul_const_8k
    archetype: rept
    instruction: "vmul.f32 s0, s1, s2"
    count: 8192
    prologue:
      - "vmov.f32 s1, #1.0"
      - "vmov.f32 s2, #2.0"
    partition: core
    smoke: true

  - name: vfma_const_8k
    archetype: rept
    instruction: "vfma.f32 s0, s1, s2"
    count: 8192
    prologue:
      - "vmov.f32 s0, #1.0"
      - "vmov.f32 s1, #1.0"
      - "vmov.f32 s2, #2.0"
    partition: core

  - name: vdiv_easy_8k
    # Best case: 1.0 / 1.0
    archetype: rept
    instruction: "vdiv.f32 s0, s1, s2"
    count: 4096
    prologue:
      - "vmov.f32 s1, #1.0"
      - "vmov.f32 s2, #1.0"
    partition: core

  - name: vdiv_hard_8k
    # Worst-case-ish: irrational pair pre-loaded from a literal pool.
    archetype: rept
    instruction: "vdiv.f32 s0, s1, s2"
    count: 4096
    prologue:
      - "ldr r0, =0x40490FDB"  # pi as float
      - "vmov s1, r0"
      - "ldr r0, =0x402DF854"  # e as float
      - "vmov s2, r0"
    partition: core

  - name: vsqrt_easy_8k
    archetype: rept
    instruction: "vsqrt.f32 s0, s1"
    count: 4096
    prologue:
      - "vmov.f32 s1, #1.0"
    partition: core

  - name: vsqrt_hard_8k
    archetype: rept
    instruction: "vsqrt.f32 s0, s1"
    count: 4096
    prologue:
      - "ldr r0, =0x40490FDB"  # pi
      - "vmov s1, r0"
    partition: core

  - name: vcvt_const_8k
    archetype: rept
    instruction: "vcvt.s32.f32 s0, s1"
    count: 8192
    prologue:
      - "vmov.f32 s1, #1.0"
    partition: core

  # ====================================================================
  # 3. Memory loads + stores  (memory partition)
  # ====================================================================
  - name: load_hot_8k
    # LDR same address — always cache hit
    archetype: rept
    instruction: "ldr r4, [r0]"
    count: 8192
    aapcs: full_int
    prologue:
      - "ldr r0, =hot_buffer"
    data:
      symbol: hot_buffer
      kind: word
      count: 1
      init: 0xCAFEBABE
    partition: memory
    smoke: true

  - name: load_seq_8k
    # LDR sequential addresses; uses ldr Rt, [Rn], #4 post-inc.
    # Shares mem_pool_a with other sequential-stream kernels via the
    # external `mem_pool_a` symbol defined in mem_pool.S — keeps SRAM
    # footprint flat instead of growing linearly with the kernel count.
    archetype: rept
    instruction: "ldr r4, [r0], #4"
    count: 4096
    aapcs: full_int
    prologue:
      - "ldr r0, =mem_pool_a"
    partition: memory

  - name: load_ccm_8k
    archetype: rept
    instruction: "ldr r4, [r0]"
    count: 8192
    aapcs: full_int
    prologue:
      - "ldr r0, =ccm_target"
    data:
      symbol: ccm_target
      kind: word
      count: 1
      init: 0xC0FFEE00
      section: ".ccm"
    partition: memory

  - name: store_hot_8k
    archetype: rept
    instruction: "str r4, [r0]"
    count: 8192
    aapcs: full_int
    prologue:
      - "ldr r0, =hot_store_buf"
      - "movs r4, #0"
    data:
      symbol: hot_store_buf
      kind: word
      count: 1
      init: 0
    partition: memory

  - name: store_seq_8k
    archetype: rept
    instruction: "str r4, [r0], #4"
    count: 4096
    aapcs: full_int
    prologue:
      - "ldr r0, =mem_pool_b"
      - "movs r4, #0"
    partition: memory

  - name: ldm_burst_8k
    # LDMIA r0!, {r4-r7} — touches r4-r11 callee-saved range.
    # Each LDM transfers 4 words. 2048 LDMs = 8K word-loads.
    # Reuses mem_pool_a (32 KB shared) — exactly the working-set we want.
    archetype: rept
    instruction: "ldmia r0!, {r4-r7}"
    count: 2048
    aapcs: full_int
    prologue:
      - "ldr r0, =mem_pool_a"
    partition: memory

  # ====================================================================
  # 4. Branches — ART loop sweep  (memory partition)
  # ====================================================================
  - name: loop_art_64
    archetype: art_loop
    body_bytes: 64
    total_fetches: 16384
    needs_warmup: true
    partition: memory

  - name: loop_art_256
    archetype: art_loop
    body_bytes: 256
    total_fetches: 16384
    needs_warmup: true
    partition: memory

  - name: loop_art_512
    archetype: art_loop
    body_bytes: 512
    total_fetches: 16384
    needs_warmup: true
    partition: memory

  - name: loop_art_1024
    archetype: art_loop
    body_bytes: 1024
    total_fetches: 16384
    needs_warmup: true
    partition: memory

  - name: loop_art_2048
    archetype: art_loop
    body_bytes: 2048
    total_fetches: 16384
    needs_warmup: true
    partition: memory

  - name: loop_art_4096
    archetype: art_loop
    body_bytes: 4096
    total_fetches: 16384
    needs_warmup: true
    partition: memory

  # ====================================================================
  # 5. SIMD packed-integer  (core partition)
  # ====================================================================
  - name: simd_sadd16_8k
    archetype: rept
    instruction: "sadd16 r4, r5, r6"
    count: 8192
    aapcs: full_int
    prologue:
      - "movs r5, #1"
      - "movs r6, #1"
    partition: core

  - name: simd_smlad_8k
    archetype: rept
    instruction: "smlad r4, r5, r6, r7"
    count: 8192
    aapcs: full_int
    prologue:
      - "movs r5, #1"
      - "movs r6, #1"
      - "movs r7, #0"
    partition: core

  - name: simd_qadd_8k
    archetype: rept
    instruction: "qadd r4, r5, r6"
    count: 8192
    aapcs: full_int
    prologue:
      - "movs r5, #1"
      - "movs r6, #1"
    partition: core

  # ====================================================================
  # 6. WFI / sleep  (core partition; HAND-WRITTEN, codegen emits .note stub)
  # ====================================================================
  - name: wfi_100us
    archetype: wfi
    wake_us: 100
    partition: core

  # ====================================================================
  # 7. Bit-manipulation  (core partition)
  # ====================================================================
  - name: bitmanip_8k
    # REV/RBIT/CLZ/UBFX/BFI mix — five-line round-robin.
    archetype: mixed
    count: 1638  # 1638*5 ~ 8190 instructions
    pattern_prologue:
      - "movw r4, #0x5678"
      - "movt r4, #0x1234"
    pattern:
      - "rev   r5, r4"
      - "rbit  r5, r4"
      - "clz   r5, r4"
      - "ubfx  r5, r4, #4, #8"
      - "bfi   r5, r4, #0, #8"
    aapcs: full_int
    partition: core

  # ====================================================================
  # 8. D-bus streaming  (memory partition)
  # ====================================================================
  - name: load_streaming_8k
    # 8K word-loads from 32 KB pool wraps around once at 8K word offsets;
    # for v1 we accept the wrap (it's still mostly cold-line). Sharing
    # the pool avoids per-kernel SRAM bloat.
    archetype: rept
    instruction: "ldr r4, [r0], #4"
    count: 8192
    aapcs: full_int
    prologue:
      - "ldr r0, =mem_pool_a"
    partition: memory

  - name: load_random_huge_8k
    # PRNG-driven addresses across the shared 32 KB pool. The PRNG
    # offset table is *kernel-private* (random_offsets_<name>) since
    # it's per-bench deterministic. The data buffer is shared via
    # mem_pool_a so the random walk hits the same SRAM region the
    # streaming kernels touch — that's intentional, the comparison
    # is "random over hot pool" vs "sequential over hot pool".
    archetype: random_load
    count: 4096
    buffer_bytes: 32768   # buffer footprint -> shared via mem_pool_a
    seed: 0xDEAD
    shared_buffer_symbol: mem_pool_a
    aapcs: full_int
    partition: memory

  - name: store_streaming_8k
    archetype: rept
    instruction: "str r4, [r0], #4"
    count: 8192
    aapcs: full_int
    prologue:
      - "ldr r0, =mem_pool_b"
      - "movs r4, #0"
    partition: memory

  - name: memcpy_8k
    # Alternating LDR from src / STR to dst, post-inc both.
    # Uses the two shared 32 KB pools as src/dst; deliberately
    # picks pool_a for src + pool_b for dst so the two pointers
    # don't alias.
    archetype: mixed
    count: 4096
    pattern_prologue:
      - "ldr r0, =mem_pool_a"
      - "ldr r1, =mem_pool_b"
    pattern:
      - "ldr r4, [r0], #4"
      - "str r4, [r1], #4"
    aapcs: full_int
    partition: memory
